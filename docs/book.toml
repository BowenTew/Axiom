[book]
title = "Axiom Docs"
authors = ["tubowen"]
description = "One Flake to Rule Them All – for macOS (nix-darwin), NixOS, and home-manager."
language = "zh"
src = "src"

[build]
build-dir = "book"
create-missing = false

[preprocessor.index]

[preprocessor.links]

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/BeauvnTu/Bootstrap"
edit-url-template = "https://github.com/BeauvnTu/Bootstrap/edit/main/docs/{path}"
site-url = "/bootstrap/"

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true
